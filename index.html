<body>
<h1> Página de prueba </h1>

<p>Esta será la página para almacenar el proyecto</p>

<img src="https://hitcounter.pythonanywhere.com/count/tag.svg" alt="Hits">
<script src="https://cdnjs.cloudflare.com/ajax/libs/axios/0.21.1/axios.min.js" integrity="sha512-bZS47S7sPOxkjU/4Bt0zrhEtWx0y0CRkhEp8IckzK+ltifIIE9EMIMTuT/mEzoIMewUINruDBIR/jJnbguonqQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

Total descargas <p id="descargas"> </p>

<script>

axios.get('https://api.github.com/repos/FroylanMtz/proyectoTAW2019/releases')
  .then(function (response) {
    // handle success
    
    var i;
    var suma = 0;
    for(i=0;i< response.data.length; i ++){
        suma += response.data[i].assets[0].download_count;
    }
   
    document.getElementById('descargas').innerHTML = suma;
  })
  .catch(function (error) {
    // handle error
    console.log(error);
  })
  .then(function () {
    // always executed
  });

</script>



</body>
</html>
